<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Appointment Reminder System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e2a;
      --border: rgba(255,255,255,0.07);
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --green: #22c97a;
      --red: #f75c5c;
      --yellow: #f7c948;
      --text: #e8eaf0;
      --muted: #6b7280;
      --card-shadow: 0 4px 32px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 500px;
      background: radial-gradient(ellipse, rgba(79,142,247,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -100px;
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(124,92,252,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.25);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      background: linear-gradient(135deg, #e8eaf0 0%, #4f8ef7 60%, #7c5cfc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .header p {
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--card-shadow);
      margin-bottom: 20px;
      animation: fadeUp 0.6s 0.15s ease both;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }
    .card-title span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      background: rgba(79,142,247,0.12);
      border-radius: 8px;
      font-size: 15px;
    }

    /* FORM */
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #3a3f52; }
    input:focus {
      border-color: rgba(79,142,247,0.5);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.08);
    }
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }

    /* BUTTON */
    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(79,142,247,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(79,142,247,0.45);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    /* MESSAGE */
    #msg {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      min-height: 20px;
      transition: all 0.3s;
    }

    /* DASHBOARD HEADER */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .refresh-btn {
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.2);
      color: var(--accent);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover {
      background: rgba(79,142,247,0.18);
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon {
      font-size: 42px;
      margin-bottom: 12px;
      display: block;
      opacity: 0.5;
    }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    .empty-state strong { color: #4a5068; display: block; font-size: 15px; margin-bottom: 4px; }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      padding: 32px 0;
      justify-content: center;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(79,142,247,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* TABLE */
    .appt-table { width: 100%; border-collapse: collapse; }
    .appt-table thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .appt-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .appt-table tbody tr:last-child { border-bottom: none; }
    .appt-table tbody tr:hover { background: rgba(255,255,255,0.02); }
    .appt-table td {
      padding: 13px 0;
      font-size: 13px;
      vertical-align: middle;
    }
    .appt-name {
      font-weight: 500;
      color: var(--text);
    }
    .appt-phone { color: var(--muted); font-size: 12px; }
    .appt-time { color: #8b95b0; font-size: 12px; }

    /* BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-green { background: rgba(34,201,122,0.12); color: var(--green); }
    .badge-blue  { background: rgba(79,142,247,0.12); color: var(--accent); }
    .badge-gray  { background: rgba(107,114,128,0.12); color: var(--muted); }
    .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .card:nth-child(3) { animation-delay: 0.25s; }
  </style>
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <div class="header-badge">📲 WhatsApp Powered</div>
      <h1>Appointment Reminder System</h1>
      <p>Book appointments and send instant WhatsApp confirmations</p>
    </div>

    <!-- STATS ROW -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color: var(--green)" id="statConfirmed">—</div>
        <div class="stat-label">Confirmed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color: var(--accent2)" id="statReminders">—</div>
        <div class="stat-label">Reminded</div>
      </div>
    </div>

    <!-- FORM CARD -->
    <div class="card">
      <div class="card-title">
        <span>✏️</span> Book an Appointment
      </div>

      <div class="form-group">
        <label>Customer Name</label>
        <input id="name" type="text" placeholder="John Doe" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label>Phone Number (with country code)</label>
        <input id="phone" type="text" placeholder="+91 234 567 8900" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label>Appointment Date & Time</label>
        <input id="datetime" type="datetime-local"/>
      </div>

      <button id="submitBtn" class="btn btn-primary" onclick="submitForm()">
        Book & Send WhatsApp Confirmation
      </button>
      <p id="msg"></p>
    </div>

    <!-- DASHBOARD CARD -->
    <div class="card">
      <div class="dashboard-header">
        <div class="card-title" style="margin-bottom:0">
          <span>📋</span> All Appointments
        </div>
        <button class="refresh-btn" onclick="loadAppointments()">⟳ Refresh</button>
      </div>
      <div id="dashboard">
        <div class="loading"><div class="spinner"></div> Loading appointments...</div>
      </div>
    </div>

  </div>

  <script>
    async function submitForm() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const datetime = document.getElementById('datetime').value;
      const msg = document.getElementById('msg');
      const button = document.getElementById('submitBtn');

      if (!name || !phone || !datetime) {
        showMsg('⚠️ Please fill in all fields.', 'var(--red)'); return;
      }
      if (!phone.startsWith('+')) {
        showMsg('⚠️ Use country code e.g. +91xxxxxxxxxx', 'var(--red)'); return;
      }
      if (new Date(datetime) < new Date()) {
        showMsg('⚠️ Appointment must be in the future.', 'var(--red)'); return;
      }

      if (!confirm(`Book appointment for ${name} on ${new Date(datetime).toLocaleString()}?`)) return;

      button.disabled = true;
      button.textContent = 'Sending…';
      showMsg('Submitting your appointment...', 'var(--muted)');

      try {
        const res = await fetch('/api/appointments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_name: name,
            phone_number: phone,
            appointment_time: datetime
          })
        });

        const data = await res.json();

        if (res.ok) {
          showMsg('✅ Appointment booked & WhatsApp sent!', 'var(--green)');
          document.getElementById('name').value = '';
          document.getElementById('phone').value = '';
          document.getElementById('datetime').value = '';
          loadAppointments();
        } else {
          showMsg('❌ Error: ' + data.error, 'var(--red)');
        }
      } catch (err) {
        showMsg('❌ Server error. Is the backend running?', 'var(--red)');
      }

      button.disabled = false;
      button.textContent = 'Book & Send WhatsApp Confirmation';
    }

    function showMsg(text, color) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.style.color = color;
    }

    async function loadAppointments() {
      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = '<div class="loading"><div class="spinner"></div> Loading appointments...</div>';

      try {
        const res = await fetch('/api/appointments');
        const data = await res.json();

        // Update stats
        document.getElementById('statTotal').textContent = data.length;
        document.getElementById('statConfirmed').textContent = data.filter(a => a.confirmation_sent).length;
        document.getElementById('statReminders').textContent = data.filter(a => a.reminder_sent).length;

        if (!data.length) {
          dashboard.innerHTML = `
            <div class="empty-state">
              <span class="empty-icon">📅</span>
              <strong>No appointments booked yet.</strong>
              <p>Create your first appointment above<br>and a WhatsApp confirmation will be sent instantly.</p>
            </div>`;
          return;
        }

        dashboard.innerHTML = `
          <table class="appt-table">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Phone</th>
                <th>Appointment</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(a => `
                <tr>
                  <td><span class="appt-name">${escHtml(a.customer_name)}</span></td>
                  <td><span class="appt-phone">${escHtml(a.phone_number)}</span></td>
                  <td><span class="appt-time">${new Date(a.appointment_time).toLocaleString()}</span></td>
                  <td>
                    ${a.reminder_sent
                      ? '<span class="badge badge-green">Reminder Sent</span>'
                      : a.confirmation_sent
                      ? '<span class="badge badge-blue">Confirmed</span>'
                      : '<span class="badge badge-gray">Pending</span>'
                    }
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      } catch (err) {
        dashboard.innerHTML = '<div class="loading" style="color:var(--red)">⚠️ Failed to load appointments.</div>';
      }
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadAppointments();
  </script>
</body>
</html>
